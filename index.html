<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything is reborn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section id="s1">
  <canvas id="particleCanvas"></canvas>

  <div class="hero-morph"></div>

  <div class="hero-body">
    <h1>
      <span class="hw"><span class="hc">Everything</span></span>
      <span class="hw"><span class="hc">is</span></span>
      <span class="hw"><span class="hc"><em>reborn</em></span></span>
    </h1>

    <p class="hero-sub">From waste to living soil</p>
  </div>
</section>

<!-- TRANSFORMATION -->
<section id="s2">
  <h2>Transformation</h2>

  <div class="grid">
    <div class="card" data-reveal>Waste becomes soil</div>
    <div class="card" data-reveal>Soil becomes life</div>
    <div class="card" data-reveal>Nothing is lost</div>
  </div>
</section>

<!-- SYSTEM -->
<section id="s3">
  <h2>The System</h2>

  <div class="panels">

    <div class="panel" data-reveal>
      <h3>Production</h3>
      <p>Sludge → fertile soil</p>
    </div>

    <div class="panel" data-reveal>
      <h3>Agriculture</h3>
      <p>Experimental land</p>
    </div>

    <div class="panel" data-reveal>
      <h3>Science</h3>
      <p>Research & validation</p>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
